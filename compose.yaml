services:
  dashy:
    image: elestio/dashy:latest
    container_name: dashy
    restart: unless-stopped
    volumes:
      - ./data:/app/user-data
    networks:
      - proxy
    environment:
      - NODE_ENV=production
    labels:
      traefik.enable: true
      traefik.http.routers.dashy.rule: Host(`dashy.alma`)
      traefik.http.routers.dashy.entrypoints: web
      traefik.http.services.dashy.loadbalancer.server.port: 8080
      wud.tag.include: ^\d+\.\d+\.\d+$$
      wud.link.template: https://github.com/Lissy93/dashy/releases/tag/$${major}.$${minor}.$${patch}
networks:
  proxy:
    external: true
    name: proxy
